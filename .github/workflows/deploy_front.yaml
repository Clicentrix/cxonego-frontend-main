name: CI/CD Deploy to EC2 with Rsync and PM2

on:
  push:
    branches:
      - main # Change this to your main branch name
  workflow_dispatch: 

env:
  PROJECT_NAME: cxonego-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🧾 Checkout Code
      uses: actions/checkout@v3

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: ♻️ Cache NPM Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project
      run: npm run build

    - name: 📂 Create Logs Directory
      run: mkdir -p logs

    - name: 📄 Ensure server.cjs exists
      run: |
        # Check if server.cjs was renamed from server.js
        if [ ! -f server.cjs ]; then
          if [ -f server.js ]; then
            cp server.js server.cjs
          else
            echo "Error: Neither server.cjs nor server.js found!"
            exit 1
          fi
        fi

    - name: 🔄 Rsync Build to EC2
      uses: Burnett01/rsync-deployments@5.2.1
      with:
        switches: -avz --delete --exclude='.env' --exclude='node_modules' --exclude='.git'
        path: ./ # Send entire directory including dist and server files
        remote_path: /home/ubuntu/${{ env.PROJECT_NAME }}
        remote_host: ${{ secrets.HOST }}
        remote_user: ubuntu
        remote_key: ${{ secrets.SSH }}

    - name: ⚙️ Setup and Restart PM2 on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ubuntu
        key: ${{ secrets.SSH }}
        script: |
          # Load NVM to get access to the right environment
          export NVM_DIR="/home/ubuntu/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # Navigate to project directory
          cd /home/ubuntu/${{ env.PROJECT_NAME }}
          
          # Install production dependencies
          npm install --production
          
          # Create logs directory if it doesn't exist
          mkdir -p logs
          
          # Check if ecosystem.config.cjs exists (rename if needed)
          if [ ! -f ecosystem.config.cjs ]; then
            if [ -f ecosystem.config.js ]; then
              cp ecosystem.config.js ecosystem.config.cjs
            fi
          fi
          
          # Run PM2
          pm2 reload ${{ env.PROJECT_NAME }} || pm2 start ecosystem.config.cjs --env production --name ${{ env.PROJECT_NAME }}
          
          # Save PM2 configuration
          pm2 save
          
          # Display status
          pm2 status